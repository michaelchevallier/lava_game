<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fête Foraine en Lave</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23ff6b1c'/%3E%3Ctext x='50' y='72' font-size='70' text-anchor='middle' fill='white'%3E%F0%9F%94%A5%3C/text%3E%3C/svg%3E" />
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#5c94fc" />
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch(() => {});
        });
      }
    </script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a1a;
        font-family: system-ui, -apple-system, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #game-wrapper {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a1a;
      }
      #game {
        display: block;
        width: 1280px;
        height: 576px;
        max-width: 100vw;
        max-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="game-wrapper">
      <canvas id="game"></canvas>
    </div>

    <div id="mobile-controls" style="display:none; position:fixed; inset:0; pointer-events:none; z-index:100">
      <button class="mc-btn" id="mc-left">◀</button>
      <button class="mc-btn" id="mc-right">▶</button>
      <button class="mc-btn mc-jump" id="mc-jump">⬆</button>
      <button class="mc-btn mc-wagon" id="mc-wagon">🚃</button>
    </div>

    <style>
      .mc-btn {
        position: fixed;
        pointer-events: auto;
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: rgba(40,40,60,0.7);
        color: white;
        font-size: 32px;
        border: 2px solid rgba(255,255,255,0.5);
        user-select: none;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        cursor: pointer;
      }
      .mc-btn:active {
        background: rgba(80,80,120,0.85);
        transform: scale(0.93);
      }
      #mc-left  { bottom: 30px; left: 30px; }
      #mc-right { bottom: 30px; left: 130px; }
      #mc-jump  { bottom: 30px; right: 30px; background: rgba(230,60,70,0.8); }
      #mc-wagon { bottom: 130px; right: 30px; background: rgba(255,200,50,0.8); color: #222; }
    </style>

    <script>
      const c = document.getElementById('game');
      c.width = 1280; c.height = 576;
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
