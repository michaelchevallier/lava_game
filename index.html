<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fête Foraine en Lave</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23ff6b1c'/%3E%3Ctext x='50' y='72' font-size='70' text-anchor='middle' fill='white'%3E%F0%9F%94%A5%3C/text%3E%3C/svg%3E" />
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#5c94fc" />
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").then((reg) => {
            reg.update();
            reg.addEventListener("updatefound", () => {
              const w = reg.installing;
              if (!w) return;
              w.addEventListener("statechange", () => {
                if (w.state === "activated" && navigator.serviceWorker.controller) {
                  location.reload();
                }
              });
            });
          }).catch(() => {});
          setInterval(() => {
            navigator.serviceWorker.getRegistration().then(r => r && r.update());
          }, 60000);
        });
      }
    </script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a1a;
        font-family: system-ui, -apple-system, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #game-wrapper {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a1a;
      }
      #game {
        display: block;
        width: 1280px;
        height: 576px;
        max-width: 100vw;
        max-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="game-wrapper">
      <canvas id="game"></canvas>
    </div>

    <div id="mobile-controls" style="display:none; position:fixed; inset:0; pointer-events:none; z-index:100">
      <button class="mc-btn" id="mc-left">◀</button>
      <button class="mc-btn" id="mc-right">▶</button>
      <button class="mc-btn mc-jump" id="mc-jump">⬆</button>
      <button class="mc-btn mc-wagon" id="mc-wagon">🚃</button>
    </div>

    <style>
      .mc-btn {
        position: fixed;
        pointer-events: auto;
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: rgba(40,40,60,0.18);
        color: rgba(255,255,255,0.65);
        font-size: 22px;
        border: 1px solid rgba(255,255,255,0.22);
        user-select: none;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        cursor: pointer;
      }
      .mc-btn:active {
        background: rgba(80,80,120,0.45);
        color: rgba(255,255,255,0.95);
        transform: scale(0.9);
      }
      #mc-left  { bottom: 20px; left: 20px; }
      #mc-right { bottom: 20px; left: 88px; }
      #mc-jump  { bottom: 20px; right: 20px; background: rgba(230,60,70,0.22); }
      #mc-jump:active { background: rgba(230,60,70,0.6); }
      #mc-wagon { bottom: 88px; right: 20px; background: rgba(255,200,50,0.22); color: rgba(30,30,30,0.7); }
      #mc-wagon:active { background: rgba(255,200,50,0.6); color: rgba(30,30,30,0.95); }
    </style>

    <script>
      const c = document.getElementById('game');
      c.width = 1280; c.height = 576;
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
