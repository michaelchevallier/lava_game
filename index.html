<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Park Defense — Foire en Lave</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23ff6b1c'/%3E%3Ctext x='50' y='72' font-size='70' text-anchor='middle' fill='white'%3E%F0%9F%94%A5%3C/text%3E%3C/svg%3E" />
    <meta name="theme-color" content="#1a1f30" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #1a1f30;
        height: 100%;
        overflow: hidden;
        font-family: system-ui, -apple-system, sans-serif;
      }
      #game {
        width: 100vw;
        height: 100vh;
      }
    </style>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then((regs) => {
          for (const r of regs) r.unregister();
        });
      }
    </script>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src-v2/main.js"></script>
  </body>
</html>
