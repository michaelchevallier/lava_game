<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fête Foraine en Lave</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23ff6b1c'/%3E%3Ctext x='50' y='72' font-size='70' text-anchor='middle' fill='white'%3E%F0%9F%94%A5%3C/text%3E%3C/svg%3E" />
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#5c94fc" />
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").then((reg) => {
            reg.update();
            reg.addEventListener("updatefound", () => {
              const w = reg.installing;
              if (!w) return;
              w.addEventListener("statechange", () => {
                if (w.state === "activated" && navigator.serviceWorker.controller) {
                  location.reload();
                }
              });
            });
          }).catch(() => {});
          setInterval(() => {
            navigator.serviceWorker.getRegistration().then(r => r && r.update());
          }, 60000);
        });
      }
    </script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a1a;
        font-family: monospace, system-ui, -apple-system, sans-serif;
        display: flex;
        flex-direction: column;
      }
      #top-bar {
        flex-shrink: 0;
        height: 52px;
        background: rgba(15,20,35,0.97);
        border-bottom: 2px solid #ffd23f;
        color: #fff;
        font-family: monospace;
        font-size: 13px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 12px;
        gap: 12px;
        user-select: none;
        position: relative;
        z-index: 50;
      }
      #hud-score {
        font-size: 20px;
        font-weight: bold;
        color: #ffe650;
        min-width: 120px;
        white-space: nowrap;
      }
      #hud-stats {
        font-size: 12px;
        color: #e6e6e6;
        white-space: nowrap;
      }
      #hud-palier {
        font-size: 12px;
        color: #ffc864;
        white-space: nowrap;
      }
      #hud-palier-bar-wrap {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      #hud-palier-bar-bg {
        width: 90px;
        height: 5px;
        background: #28324a;
        border-radius: 3px;
        overflow: hidden;
      }
      #hud-palier-bar {
        height: 5px;
        background: #ffc864;
        border-radius: 3px;
        transition: width 0.3s;
      }
      #hud-tip {
        font-size: 11px;
        color: #c8dcff;
        opacity: 0.85;
        max-width: 320px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
        text-align: center;
      }
      #hud-record {
        font-size: 11px;
        color: #b4c8ff;
        white-space: nowrap;
      }
      #game-wrapper {
        flex: 1;
        min-height: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a1a;
        position: relative;
      }
      #game {
        display: block !important;
        width: 100% !important;
        height: 100% !important;
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        image-rendering: pixelated;
        image-rendering: -moz-crisp-edges;
        image-rendering: crisp-edges;
        transform: translateZ(0);
        will-change: transform;
      }
      #bottom-bar {
        flex-shrink: 0;
        min-height: 68px;
        background: rgba(15,20,35,0.97);
        border-top: 2px solid #ffd23f;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 3px;
        padding: 5px 8px;
        position: relative;
        z-index: 50;
        flex-wrap: wrap;
      }
      #toolbar-buttons {
        display: flex;
        gap: 3px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .tb-btn {
        width: 52px;
        height: 52px;
        background: #1a2236;
        border: 1.5px solid #3c4e6e;
        border-radius: 5px;
        color: #b4c8e8;
        font-family: monospace;
        font-size: 10px;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        padding: 3px 2px 3px 2px;
        position: relative;
        transition: border-color 0.1s, background 0.1s;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        overflow: hidden;
      }
      .tb-btn:hover {
        border-color: #ffd23f;
        background: #1e2c48;
      }
      .tb-btn.selected {
        border-color: #ffd23f;
        background: #ffd23f;
        color: #1a1a28;
      }
      .tb-btn.selected .tb-key {
        color: #1a1a28;
      }
      .tb-btn.selected .tb-label {
        color: #1a1a28;
      }
      .tb-btn:active {
        transform: scale(0.93);
      }
      .tb-key {
        font-size: 10px;
        color: #7890b4;
        align-self: flex-end;
        line-height: 1;
      }
      .tb-icon {
        font-size: 16px;
        line-height: 1;
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .tb-label {
        font-size: 9px;
        color: #96a8c4;
        line-height: 1;
        text-align: center;
      }
      #cog-btn {
        width: 52px;
        height: 52px;
        background: #1a2236;
        border: 1.5px solid #3c4e6e;
        border-radius: 50%;
        color: #ffd23f;
        font-size: 22px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-left: 8px;
        flex-shrink: 0;
        transition: border-color 0.1s, background 0.1s;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }
      #cog-btn:hover {
        border-color: #ffd23f;
        background: #1e2c48;
      }
      #cog-btn:active {
        transform: scale(0.93);
      }
    </style>
  </head>
  <body>
    <div id="top-bar">
      <span id="hud-score">SCORE 0</span>
      <span id="hud-stats">Wagons 0 | Squelettes 0 | Pieces 0 | Rates 0</span>
      <div id="hud-palier-bar-wrap">
        <span id="hud-palier">Palier 50 (-50)</span>
        <div id="hud-palier-bar-bg"><div id="hud-palier-bar" style="width:0%"></div></div>
      </div>
      <span id="hud-tip"></span>
      <span id="hud-record">Record 0</span>
    </div>

    <div id="game-wrapper">
      <canvas id="game"></canvas>
    </div>

    <div id="bottom-bar">
      <div id="toolbar-buttons"></div>
      <button id="cog-btn" title="Options (Cog)">&#9881;</button>
    </div>

    <div id="mobile-controls" style="display:none; position:fixed; inset:0; pointer-events:none; z-index:100">
      <button class="mc-btn" id="mc-left">◀</button>
      <button class="mc-btn" id="mc-right">▶</button>
      <button class="mc-btn mc-jump" id="mc-jump">⬆</button>
      <button class="mc-btn mc-wagon" id="mc-wagon">🚃</button>
    </div>

    <style>
      .mc-btn {
        position: fixed;
        pointer-events: auto;
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: rgba(40,40,60,0.18);
        color: rgba(255,255,255,0.65);
        font-size: 22px;
        border: 1px solid rgba(255,255,255,0.22);
        user-select: none;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        cursor: pointer;
      }
      .mc-btn:active {
        background: rgba(80,80,120,0.45);
        color: rgba(255,255,255,0.95);
        transform: scale(0.9);
      }
      #mc-left  { bottom: 80px; left: 20px; }
      #mc-right { bottom: 80px; left: 88px; }
      #mc-jump  { bottom: 80px; right: 20px; background: rgba(230,60,70,0.22); }
      #mc-jump:active { background: rgba(230,60,70,0.6); }
      #mc-wagon { bottom: 148px; right: 20px; background: rgba(255,200,50,0.22); color: rgba(30,30,30,0.7); }
      #mc-wagon:active { background: rgba(255,200,50,0.6); color: rgba(30,30,30,0.95); }
    </style>

    <script>
      const c = document.getElementById('game');
      c.width = 1280;
      c.height = 576;
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
