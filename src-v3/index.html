<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <title>Milan Crowd Defense</title>
    <style>
      :root { color-scheme: dark; }
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #0d1418; font-family: system-ui, sans-serif; color: #fff; -webkit-tap-highlight-color: transparent; }
      #app { position: fixed; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; }
      #ui {
        position: fixed; inset: 0; pointer-events: none;
        display: flex; flex-direction: column; justify-content: space-between;
        padding: 14px 18px;
      }
      #ui .row { display: flex; gap: 12px; align-items: center; pointer-events: none; }
      #ui .row.top-bar { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 12px; }
      #ui .row.top-bar > .left { display: flex; gap: 12px; }
      #ui .row.top-bar > .right { display: flex; justify-content: flex-end; gap: 12px; }
      #coins {
        background: rgba(20,28,36,0.85); border: 2px solid #3a4a5a; border-radius: 12px;
        padding: 6px 14px; font-size: 22px; font-weight: 700;
      }
      #coins::before { content: "🪙 "; }
      #wave { background: rgba(20,28,36,0.85); border: 2px solid #3a4a5a; border-radius: 12px; padding: 6px 14px; font-size: 16px; }
      #title { font-size: 20px; font-weight: 800; letter-spacing: 1px; text-shadow: 0 3px 0 #000; }
      #footer { font-size: 12px; opacity: 0.7; background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 8px; }

      #castle-hp {
        background: rgba(20,28,36,0.92); border: 2px solid #3a4a5a; border-radius: 12px;
        padding: 4px 10px; min-width: 240px; max-width: 320px; pointer-events: none;
      }
      #castle-hp .label { display: flex; justify-content: space-between; font-size: 12px; opacity: 0.85; margin-bottom: 2px; }
      #castle-hp .label .name::before { content: "🏰 "; }
      #castle-hp .bar { position: relative; height: 14px; border-radius: 6px; background: #1d2a36; overflow: hidden; border: 1px solid rgba(0,0,0,0.4); }
      #castle-hp .bar .fill {
        height: 100%; background: linear-gradient(90deg, #5fe079, #8fee9b);
        transition: width 0.25s ease, background-color 0.25s ease;
        width: 100%;
      }
      #castle-hp.warn .bar .fill { background: linear-gradient(90deg, #f0c83d, #ffe273); }
      #castle-hp.danger .bar .fill { background: linear-gradient(90deg, #e15454, #ff9090); }
      #castle-hp.flash { animation: castle-flash 0.18s ease; }
      @keyframes castle-flash { 0% { transform: scale(1); } 50% { transform: scale(1.04); border-color: #ff5050; } 100% { transform: scale(1); } }

      #touch-zone {
        position: fixed; left: 0; bottom: 0; width: 50%; height: 60%;
        z-index: 5;
      }
      #joystick {
        position: fixed; width: 120px; height: 120px;
        border-radius: 50%; border: 3px solid rgba(255,255,255,0.4);
        background: rgba(20,28,36,0.45);
        opacity: 0.3; transition: opacity 0.15s ease;
        pointer-events: none; z-index: 10;
        left: 30px; bottom: 30px;
      }
      #joystick-knob {
        position: absolute; left: 50%; top: 50%;
        width: 50px; height: 50px; margin-left: -25px; margin-top: -25px;
        border-radius: 50%; background: rgba(255,210,63,0.85);
        border: 2px solid #c88a00;
        box-shadow: 0 4px 0 rgba(0,0,0,0.3);
      }
      @media (hover: hover) {
        #touch-zone, #joystick { display: none; }
      }

      .overlay {
        position: fixed; inset: 0; display: none;
        align-items: center; justify-content: center;
        background: rgba(8,12,18,0.78); backdrop-filter: blur(4px);
        z-index: 20; pointer-events: auto;
      }
      .overlay.show { display: flex; }
      .overlay .panel {
        background: linear-gradient(180deg, #1e2a3a, #15202d);
        border: 3px solid #3a4a5a; border-radius: 16px;
        padding: 28px 36px; min-width: 320px; max-width: 90vw;
        box-shadow: 0 12px 0 rgba(0,0,0,0.4);
        text-align: center;
      }
      .overlay .panel h2 { margin: 0 0 10px; font-size: 32px; letter-spacing: 1px; }
      .overlay#gameover .panel { border-color: #c63a10; }
      .overlay#gameover h2 { color: #ff7a55; }
      .overlay#victory .panel { border-color: #ffd23f; }
      .overlay#victory h2 { color: #ffe273; }
      .overlay .panel .stats { margin: 14px 0; font-size: 16px; opacity: 0.9; }
      .overlay .panel .actions { display: flex; gap: 12px; justify-content: center; margin-top: 16px; }
      .overlay .panel .actions button {
        background: #2c3e54; color: #fff; font-weight: 700; font-size: 16px;
        border: 2px solid #4a5d75; border-radius: 10px;
        padding: 10px 20px; cursor: pointer;
        box-shadow: 0 4px 0 rgba(0,0,0,0.4);
        transition: transform 0.08s ease, background 0.12s ease;
      }
      .overlay .panel .actions button:hover { background: #3a526d; transform: translateY(-1px); }
      .overlay .panel .actions button:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.4); }
      .overlay .panel .actions .primary { background: #c63a10; border-color: #ff7a55; }
      .overlay .panel .actions .primary:hover { background: #d8501e; }

      .damage-popup {
        position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
        background: rgba(198, 58, 16, 0.92); color: #fff;
        font-weight: 800; font-size: 26px; padding: 6px 14px;
        border-radius: 10px; border: 2px solid #ff7a55;
        pointer-events: none; z-index: 25;
        animation: damage-popup-anim 0.9s ease forwards;
      }
      @keyframes damage-popup-anim {
        0% { opacity: 0; transform: translate(-50%, 12px) scale(0.8); }
        20% { opacity: 1; transform: translate(-50%, 0) scale(1.1); }
        80% { opacity: 1; }
        100% { opacity: 0; transform: translate(-50%, -28px) scale(0.95); }
      }
    </style>
  </head>
  <body>
    <canvas id="app"></canvas>
    <div id="ui">
      <div class="row top-bar">
        <div class="left">
          <div id="title">Milan Crowd Defense</div>
          <div id="wave">Vague 1</div>
        </div>
        <div id="castle-hp">
          <div class="label"><span class="name">Château</span><span class="value"><span id="castle-hp-cur">100</span>/<span id="castle-hp-max">100</span></span></div>
          <div class="bar"><div class="fill" id="castle-hp-fill"></div></div>
        </div>
        <div class="right">
          <div id="coins">100</div>
        </div>
      </div>
      <div class="row">
        <div id="footer">WASD/flèches ou joystick pour bouger · entre dans un cercle jaune pour construire (l'or s'écoule pendant que tu y restes)</div>
      </div>
    </div>
    <div id="touch-zone"></div>
    <div id="joystick"><div id="joystick-knob"></div></div>

    <div id="gameover" class="overlay">
      <div class="panel">
        <h2>Château tombé</h2>
        <div class="stats">Vague atteinte : <strong id="gameover-wave">—</strong></div>
        <div class="actions">
          <button class="primary" data-action="restart">Recommencer</button>
        </div>
      </div>
    </div>

    <div id="victory" class="overlay">
      <div class="panel">
        <h2>Victoire !</h2>
        <div class="stats">Château : <strong id="victory-castle">—</strong> · Vagues : <strong id="victory-wave">—</strong></div>
        <div class="actions">
          <button class="primary" data-action="restart">Rejouer</button>
        </div>
      </div>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
