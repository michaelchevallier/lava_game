<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <title>Milan Crowd Defense</title>
    <style>
      :root { color-scheme: dark; }
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #0d1418; font-family: system-ui, sans-serif; color: #fff; -webkit-tap-highlight-color: transparent; }
      #app { position: fixed; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; }
      #ui {
        position: fixed; inset: 0; pointer-events: none;
        display: flex; flex-direction: column; justify-content: space-between;
        padding: 14px 18px;
      }
      #ui .row { display: flex; gap: 12px; align-items: center; pointer-events: none; }
      #ui .row.top-bar { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 12px; }
      #ui .row.top-bar > .left { display: flex; gap: 12px; }
      #ui .row.top-bar > .right { display: flex; justify-content: flex-end; gap: 12px; }
      #coins {
        background: rgba(20,28,36,0.85); border: 2px solid #3a4a5a; border-radius: 12px;
        padding: 6px 14px; font-size: 22px; font-weight: 700;
      }
      #coins::before { content: "🪙 "; }
      #wave { background: rgba(20,28,36,0.85); border: 2px solid #3a4a5a; border-radius: 12px; padding: 6px 14px; font-size: 16px; }
      #mute-btn {
        background: rgba(20,28,36,0.85); border: 2px solid #3a4a5a; border-radius: 12px;
        padding: 4px 10px; font-size: 22px; cursor: pointer; pointer-events: auto;
        transition: background 0.12s ease, transform 0.08s ease;
      }
      #mute-btn:hover { background: rgba(40,52,68,0.9); }
      #mute-btn:active { transform: translateY(1px); }
      #mute-btn.muted { opacity: 0.55; }
      #title { font-size: 20px; font-weight: 800; letter-spacing: 1px; text-shadow: 0 3px 0 #000; }
      #footer { font-size: 12px; opacity: 0.7; background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 8px; }

      #hero-bar {
        background: rgba(20,28,36,0.85); border: 2px solid #3a4a5a; border-radius: 12px;
        padding: 4px 10px; min-width: 180px; pointer-events: none;
      }
      #hero-bar .label { display: flex; justify-content: space-between; font-size: 12px; opacity: 0.85; margin-bottom: 2px; }
      #hero-bar .label .name::before { content: "👑 "; }
      #hero-bar .bar { position: relative; height: 8px; border-radius: 4px; background: #1d2a36; overflow: hidden; border: 1px solid rgba(0,0,0,0.4); }
      #hero-bar .fill {
        height: 100%; background: linear-gradient(90deg, #66ccff, #aae5ff);
        transition: width 0.2s ease;
        width: 0;
      }
      #hero-bar.maxed .fill { background: linear-gradient(90deg, #ffd23f, #ffe273); width: 100%; }

      #castle-hp {
        background: rgba(20,28,36,0.92); border: 2px solid #3a4a5a; border-radius: 12px;
        padding: 4px 10px; min-width: 240px; max-width: 320px; pointer-events: none;
      }
      #castle-hp .label { display: flex; justify-content: space-between; font-size: 12px; opacity: 0.85; margin-bottom: 2px; }
      #castle-hp .label .name::before { content: "🏰 "; }
      #castle-hp .bar { position: relative; height: 14px; border-radius: 6px; background: #1d2a36; overflow: hidden; border: 1px solid rgba(0,0,0,0.4); }
      #castle-hp .bar .fill {
        height: 100%; background: linear-gradient(90deg, #5fe079, #8fee9b);
        transition: width 0.25s ease, background-color 0.25s ease;
        width: 100%;
      }
      #castle-hp.warn .bar .fill { background: linear-gradient(90deg, #f0c83d, #ffe273); }
      #castle-hp.danger .bar .fill { background: linear-gradient(90deg, #e15454, #ff9090); }
      #castle-hp.flash { animation: castle-flash 0.18s ease; }
      @keyframes castle-flash { 0% { transform: scale(1); } 50% { transform: scale(1.04); border-color: #ff5050; } 100% { transform: scale(1); } }

      #touch-zone {
        position: fixed; left: 0; bottom: 0; width: 50%; height: 60%;
        z-index: 5;
      }
      #joystick {
        position: fixed; width: 120px; height: 120px;
        border-radius: 50%; border: 3px solid rgba(255,255,255,0.4);
        background: rgba(20,28,36,0.45);
        opacity: 0.3; transition: opacity 0.15s ease;
        pointer-events: none; z-index: 10;
        left: 30px; bottom: 30px;
      }
      #joystick-knob {
        position: absolute; left: 50%; top: 50%;
        width: 50px; height: 50px; margin-left: -25px; margin-top: -25px;
        border-radius: 50%; background: rgba(255,210,63,0.85);
        border: 2px solid #c88a00;
        box-shadow: 0 4px 0 rgba(0,0,0,0.3);
      }
      @media (hover: hover) {
        #touch-zone, #joystick { display: none; }
      }

      .overlay {
        position: fixed; inset: 0; display: none;
        align-items: center; justify-content: center;
        background: rgba(8,12,18,0.78); backdrop-filter: blur(4px);
        z-index: 20; pointer-events: auto;
      }
      .overlay.show { display: flex; }
      .overlay .panel {
        background: linear-gradient(180deg, #1e2a3a, #15202d);
        border: 3px solid #3a4a5a; border-radius: 16px;
        padding: 28px 36px; min-width: 320px; max-width: 90vw;
        box-shadow: 0 12px 0 rgba(0,0,0,0.4);
        text-align: center;
      }
      .overlay .panel h2 { margin: 0 0 10px; font-size: 32px; letter-spacing: 1px; }
      .overlay#gameover .panel { border-color: #c63a10; }
      .overlay#gameover h2 { color: #ff7a55; }
      .overlay#victory .panel { border-color: #ffd23f; }
      .overlay#victory h2 { color: #ffe273; }
      .overlay#result .panel { border-color: #5fe079; min-width: 360px; }
      .overlay#result h2 { color: #aae5b3; }
      .overlay#result.lost .panel { border-color: #c63a10; }
      .overlay#result.lost h2 { color: #ff7a55; }
      .overlay#briefing { background: rgba(8,12,18,0.65); }
      .overlay#briefing .panel { border-color: #66ccff; min-width: 320px; }
      .overlay#briefing h2 { color: #aae5ff; }
      #briefing-countdown { font-size: 60px; font-weight: 900; color: #ffe273; text-shadow: 0 4px 0 #000; }

      .stars-row { display: flex; gap: 8px; justify-content: center; margin: 14px 0; }
      .star {
        font-size: 42px; line-height: 1; opacity: 0.25; transform: scale(0.8);
        transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .star.earned { opacity: 1; transform: scale(1.1); color: #ffd23f; text-shadow: 0 0 12px rgba(255,210,63,0.6); }
      .overlay .panel .stats { margin: 14px 0; font-size: 16px; opacity: 0.9; }
      .overlay .panel .actions { display: flex; gap: 12px; justify-content: center; margin-top: 16px; }
      .overlay .panel .actions button {
        background: #2c3e54; color: #fff; font-weight: 700; font-size: 16px;
        border: 2px solid #4a5d75; border-radius: 10px;
        padding: 10px 20px; cursor: pointer;
        box-shadow: 0 4px 0 rgba(0,0,0,0.4);
        transition: transform 0.08s ease, background 0.12s ease;
      }
      .overlay .panel .actions button:hover { background: #3a526d; transform: translateY(-1px); }
      .overlay .panel .actions button:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.4); }
      .overlay .panel .actions .primary { background: #c63a10; border-color: #ff7a55; }
      .overlay .panel .actions .primary:hover { background: #d8501e; }

      #fps-meter {
        position: fixed; left: 10px; top: 10px; z-index: 30;
        background: rgba(20,28,36,0.85); border: 2px solid #3a4a5a; border-radius: 8px;
        padding: 4px 10px; font-size: 13px; font-family: ui-monospace, "SF Mono", Menlo, monospace;
        pointer-events: auto; cursor: pointer; user-select: none;
        opacity: 0.85; transition: opacity 0.15s ease, border-color 0.2s ease;
      }
      #fps-meter:hover { opacity: 1; }
      #fps-meter.good { color: #5fe079; border-color: #2f8a3a; }
      #fps-meter.warn { color: #f0c83d; border-color: #c8a43d; }
      #fps-meter.bad { color: #ff7a55; border-color: #c63a10; }
      #fps-meter.hidden { display: none; }

      #perk-overlay .panel { min-width: 0; max-width: 95vw; padding: 24px 28px; }
      #perk-overlay .panel h2 { color: #ffd23f; }
      #perk-overlay .subtitle { font-size: 14px; opacity: 0.85; margin-bottom: 16px; }
      #perk-cards { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
      .perk-card {
        background: linear-gradient(180deg, #2c3e54, #1d2a36);
        border: 3px solid #4a5d75; border-radius: 14px;
        padding: 18px 16px; min-width: 180px; max-width: 220px;
        cursor: pointer; pointer-events: auto;
        transition: transform 0.1s ease, border-color 0.15s ease, box-shadow 0.15s ease;
        text-align: center;
        box-shadow: 0 6px 0 rgba(0,0,0,0.4);
      }
      .perk-card:hover { transform: translateY(-4px); border-color: #ffd23f; box-shadow: 0 10px 0 rgba(0,0,0,0.45); }
      .perk-card:active { transform: translateY(0); box-shadow: 0 3px 0 rgba(0,0,0,0.4); }
      .perk-card.cat-offensive { border-color: #c63a10; }
      .perk-card.cat-economy { border-color: #ffd23f; }
      .perk-card.cat-mobility { border-color: #66ccff; }
      .perk-card.cat-offensive:hover { border-color: #ff7a55; box-shadow: 0 10px 24px rgba(198,58,16,0.3), 0 10px 0 rgba(0,0,0,0.45); }
      .perk-card.cat-economy:hover { border-color: #ffe273; box-shadow: 0 10px 24px rgba(255,210,63,0.3), 0 10px 0 rgba(0,0,0,0.45); }
      .perk-card.cat-mobility:hover { border-color: #aae5ff; box-shadow: 0 10px 24px rgba(102,204,255,0.3), 0 10px 0 rgba(0,0,0,0.45); }
      .perk-card .icon { font-size: 42px; margin-bottom: 8px; }
      .perk-card .name { font-size: 17px; font-weight: 800; margin-bottom: 6px; }
      .perk-card .desc { font-size: 13px; opacity: 0.9; line-height: 1.3; }
      .perk-card .stack { font-size: 11px; opacity: 0.6; margin-top: 8px; }

      .damage-popup {
        position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
        background: rgba(198, 58, 16, 0.92); color: #fff;
        font-weight: 800; font-size: 26px; padding: 6px 14px;
        border-radius: 10px; border: 2px solid #ff7a55;
        pointer-events: none; z-index: 25;
        animation: damage-popup-anim 0.9s ease forwards;
      }
      @keyframes damage-popup-anim {
        0% { opacity: 0; transform: translate(-50%, 12px) scale(0.8); }
        20% { opacity: 1; transform: translate(-50%, 0) scale(1.1); }
        80% { opacity: 1; }
        100% { opacity: 0; transform: translate(-50%, -28px) scale(0.95); }
      }
    </style>
  </head>
  <body>
    <canvas id="app"></canvas>
    <div id="fps-meter" class="good" title="Clic pour cacher / F pour toggle">60 FPS</div>
    <div id="ui">
      <div class="row top-bar">
        <div class="left">
          <div id="title">Milan Crowd Defense</div>
          <div id="wave">Vague 1</div>
          <div id="hero-bar">
            <div class="label"><span class="name">Lv <span id="hero-level">1</span></span><span class="value"><span id="hero-xp">0</span>/<span id="hero-xpnext">30</span></span></div>
            <div class="bar"><div class="fill" id="hero-xp-fill"></div></div>
          </div>
        </div>
        <div id="castle-hp">
          <div class="label"><span class="name">Château</span><span class="value"><span id="castle-hp-cur">100</span>/<span id="castle-hp-max">100</span></span></div>
          <div class="bar"><div class="fill" id="castle-hp-fill"></div></div>
        </div>
        <div class="right">
          <button id="mute-btn" type="button" aria-label="Mute" title="Couper le son">🔊</button>
          <div id="coins">100</div>
        </div>
      </div>
      <div class="row">
        <div id="footer">WASD/flèches ou joystick pour bouger · entre dans un cercle jaune pour construire (l'or s'écoule pendant que tu y restes)</div>
      </div>
    </div>
    <div id="touch-zone"></div>
    <div id="joystick"><div id="joystick-knob"></div></div>

    <div id="briefing" class="overlay">
      <div class="panel">
        <h2 id="briefing-name">—</h2>
        <div class="stats" id="briefing-text">—</div>
        <div id="briefing-countdown">3</div>
      </div>
    </div>

    <div id="result" class="overlay">
      <div class="panel">
        <h2 id="result-title">Victoire !</h2>
        <div class="stars-row">
          <span class="star" id="star-1">★</span>
          <span class="star" id="star-2">★</span>
          <span class="star" id="star-3">★</span>
        </div>
        <div class="stats">
          Château : <strong id="result-castle">—</strong> ·
          Vagues : <strong id="result-wave">—</strong> ·
          Or final : <strong id="result-coins">—</strong>
        </div>
        <div class="actions">
          <button data-action="map" id="result-map-btn">Carte</button>
          <button class="primary" data-action="restart">Rejouer</button>
          <button class="primary" data-action="next" id="result-next-btn">Niveau suivant</button>
        </div>
      </div>
    </div>

    <div id="perk-overlay" class="overlay">
      <div class="panel">
        <h2>Niveau <span id="perk-level">2</span> !</h2>
        <div class="subtitle">Choisis une amélioration</div>
        <div id="perk-cards"></div>
      </div>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
